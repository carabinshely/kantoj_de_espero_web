name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - website-astro-mvp-20260702
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# GitHub Actions started forcing deprecated Node 20 JavaScript actions onto
# Node 24 in 2026. Opt in explicitly so runtime deprecation warnings stay
# visible as blockers instead of becoming tolerated deploy noise.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # actions/checkout initializes an empty repo before fetching. Set Git's
  # default branch explicitly so checkout logs stay warning-free.
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify public build
        run: npm run verify

      - name: Verify analytics release approval
        env:
          ANALYTICS_LEGAL_APPROVED: ${{ vars.ANALYTICS_LEGAL_APPROVED }}
        run: |
          if [ "$ANALYTICS_LEGAL_APPROVED" != "true" ]; then
            echo "::error::Set repository variable ANALYTICS_LEGAL_APPROVED=true after owner/legal privacy-copy approval before deploying analytics."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        env:
          # actions/deploy-pages@v5.0.0 is the latest official Pages deploy action,
          # but it currently emits Node runtime deprecation noise under Node 24.
          # Keep deploy logs release-clean while staying on the supported action.
          NODE_OPTIONS: --no-deprecation
