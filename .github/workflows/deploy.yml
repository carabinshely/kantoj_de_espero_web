name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - website-astro-mvp-20260702
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# GitHub Actions started forcing deprecated Node 20 JavaScript actions onto
# Node 24 in 2026. Opt in explicitly so runtime deprecation warnings stay
# visible as blockers instead of becoming tolerated deploy noise.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify public build
        run: npm run verify:data && npm run verify:routes && npm run verify:seo && npm run verify:privacy

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
